name: Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: automata-backend
  IMAGE_FRONTEND: automata-frontend

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'automata-web/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=automata-backend
          cache-to: type=gha,mode=max,scope=automata-backend

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./automata-web
          file: ./automata-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=automata-frontend
          cache-to: type=gha,mode=max,scope=automata-frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export GHCR_OWNER="${{ github.repository_owner }}"
            export GHCR_OWNER="${GHCR_OWNER,,}"
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
              export FRONTEND_IMAGE_TAG="${{ github.sha }}"
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              export BACKEND_IMAGE_TAG="${{ github.sha }}"
            fi
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              docker compose -f docker-compose.prod.yml run --rm backend alembic -c /app/alembic.ini upgrade head || echo "[warn] db migration failed, continue"
            fi
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull frontend
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              docker compose -f docker-compose.prod.yml pull backend
            fi
            docker compose -f docker-compose.prod.yml up -d
            curl -fsS "http://127.0.0.1:8080/" >/dev/null || echo "[warn] frontend health failed"
            curl -fsS "http://127.0.0.1:18005/health" >/dev/null || echo "[warn] backend health failed"
            curl -fsS "http://127.0.0.1:18001/health" >/dev/null || echo "[warn] download health failed"
            docker image prune -f
