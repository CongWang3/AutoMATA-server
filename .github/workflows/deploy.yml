name: Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: automata-backend
  IMAGE_FRONTEND: automata-frontend
  # 阿里云 ACR 配置
  ALIYUN_REGISTRY: crpi-c0pltk6mq32oe9t3.cn-hangzhou.personal.cr.aliyuncs.com
  ALIYUN_NAMESPACE: automata-bio

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'code/**'
            frontend:
              - 'automata-web/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'deploy/**'
              - '.github/workflows/deploy.yml'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        run: cp -r ./code ./backend/code

      - name: Push backend image
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=automata-backend
          cache-to: type=gha,mode=max,scope=automata-backend

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./automata-web
          file: ./automata-web/Dockerfile
          build-args: |
            VITE_PUBLIC_SITE_ORIGIN=${{ vars.VITE_PUBLIC_SITE_ORIGIN }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=automata-frontend
          cache-to: type=gha,mode=max,scope=automata-frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 部署目录优先级：Repository Variable DEPLOY_PATH > 仓库内 deploy/DEPLOY_PATH > 默认
      - name: Resolve DEPLOY_PATH
        env:
          DEPLOY_PATH_VAR: ${{ vars.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEFAULT="/xp/www/AutoMATA-prod"
          from_file=""
          if [ -f deploy/DEPLOY_PATH ]; then
            from_file="$(tr -d '\r\n' < deploy/DEPLOY_PATH | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          fi
          if [ -n "${DEPLOY_PATH_VAR:-}" ]; then
            chosen="${DEPLOY_PATH_VAR}"
          elif [ -n "${from_file:-}" ]; then
            chosen="${from_file}"
          else
            chosen="${DEFAULT}"
          fi
          echo "DEPLOY_PATH=${chosen}" >> "$GITHUB_ENV"
          echo "Using DEPLOY_PATH=${chosen}"

      - name: Validate required deploy secrets
        id: deploy_auth
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          missing=""
          for v in SSH_HOST SSH_USER GHCR_USERNAME GHCR_READ_TOKEN; do
            if [ -z "${!v:-}" ]; then
              missing="$missing $v"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub Secrets:$missing"
            exit 1
          fi
          if [ -n "${SSH_KEY:-}" ]; then
            echo "method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "${SSH_PASSWORD:-}" ]; then
            echo "method=password" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Set either SSH_KEY (recommended) or SSH_PASSWORD"
            exit 1
          fi

      - name: Deploy via SSH (private key)
        if: steps.deploy_auth.outputs.method == 'key'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            # 下载最新的 docker-compose.prod.yml（使用 GitHub API + GHCR_READ_TOKEN）
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/CongWang3/AutoMATA-server/contents/docker-compose.prod.yml?ref=main" | \
              jq -r '.content' | base64 -d > docker-compose.prod.yml
            # 参考注释 SQL：优先 HTTPS（默认阿里云 OSS）；失败则回退 GitHub Release
            export REFERENCE_SQL_ARCHIVE_URL="${{ secrets.REFERENCE_SQL_ARCHIVE_URL }}"
            if [ -z "${REFERENCE_SQL_ARCHIVE_URL}" ]; then
              export REFERENCE_SQL_ARCHIVE_URL="${{ vars.REFERENCE_SQL_ARCHIVE_URL }}"
            fi
            if [ -z "${REFERENCE_SQL_ARCHIVE_URL}" ]; then
              export REFERENCE_SQL_ARCHIVE_URL="https://xxs-img.oss-cn-hangzhou.aliyuncs.com/automata/automata-reference-sql.tar.gz"
            fi
            export REFERENCE_SQL_ARCHIVE_NAME="automata-reference-sql.tar.gz"
            export REFERENCE_SQL_DIR="./data/reference_sql"
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/deploy/fetch-reference-sql-from-url.sh?ref=${{ github.ref_name }}" | \
              jq -r '.content' | base64 -d > /tmp/fetch-reference-sql-from-url.sh
            chmod +x /tmp/fetch-reference-sql-from-url.sh
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/deploy/fetch-reference-from-github-release.sh?ref=${{ github.ref_name }}" | \
              jq -r '.content' | base64 -d > /tmp/fetch-reference-from-github-release.sh
            chmod +x /tmp/fetch-reference-from-github-release.sh
            export REFERENCE_GITHUB_REPO="${{ github.repository }}"
            export REFERENCE_RELEASE_TAG="latest"
            export REFERENCE_ASSET_NAME="automata-reference-sql.tar.gz"
            export REFERENCE_GITHUB_TOKEN="${{ secrets.REFERENCE_GITHUB_TOKEN || secrets.GHCR_READ_TOKEN }}"
            /tmp/fetch-reference-sql-from-url.sh || {
              echo "[warn] OSS/URL 参考 SQL 下载失败，尝试 GitHub Release"
              /tmp/fetch-reference-from-github-release.sh || echo "[warn] reference release fetch failed or skipped"
            }
            # 从 GitHub Secrets 注入 Agent 配置到 .env.prod
            grep -q '^AGENT_ENABLED=' .env.prod && sed -i '/^AGENT_ENABLED=/d' .env.prod
            grep -q '^AGENT_DEFAULT_PROVIDER=' .env.prod && sed -i '/^AGENT_DEFAULT_PROVIDER=/d' .env.prod
            grep -q '^AGENT_DEEPSEEK_API_KEY=' .env.prod && sed -i '/^AGENT_DEEPSEEK_API_KEY=/d' .env.prod
            echo 'AGENT_ENABLED=${{ secrets.AGENT_ENABLED }}' >> .env.prod
            echo 'AGENT_DEFAULT_PROVIDER=${{ secrets.AGENT_DEFAULT_PROVIDER }}' >> .env.prod
            echo 'AGENT_DEEPSEEK_API_KEY=${{ secrets.AGENT_DEEPSEEK_API_KEY }}' >> .env.prod
            # 参考注释 SQL 挂载路径（与 compose 一致）；部署目录不手写，由 CI 每次覆盖写入
            grep -q '^REFERENCE_DATA_SQL_DIR=' .env.prod && sed -i '/^REFERENCE_DATA_SQL_DIR=/d' .env.prod
            echo 'REFERENCE_DATA_SQL_DIR=/app/reference_sql' >> .env.prod
            # 加载环境变量
            set -a && source .env.prod && set +a
            # 使用阿里云 ACR 镜像（国内访问更快）
            export ALIYUN_REGISTRY="crpi-c0pltk6mq32oe9t3.cn-hangzhou.personal.cr.aliyuncs.com"
            export ALIYUN_NAMESPACE="automata-bio"
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
              export FRONTEND_IMAGE_TAG="${{ github.sha }}"
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              export BACKEND_IMAGE_TAG="${{ github.sha }}"
            fi
            # 登录阿里云 ACR
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login --username "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin ${{ env.ALIYUN_REGISTRY }}
            echo "[info] Starting deployment (using Aliyun ACR)..."
            
            # Detect docker compose command
            DOCKER_COMPOSE_CMD="docker compose"
            if ! $DOCKER_COMPOSE_CMD version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker-compose"
            fi
            echo "[info] Using: $DOCKER_COMPOSE_CMD"
            DOCKER_COMPOSE_PROD="$DOCKER_COMPOSE_CMD --env-file .env.prod -f docker-compose.prod.yml"
            
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] Pulling frontend image (layer progress below; large pulls can take many minutes)..."
              $DOCKER_COMPOSE_PROD pull frontend && echo "[info] Frontend image pulled successfully"
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] Pulling backend image — 含 PyTorch 等依赖时镜像可达数 GB，拉取 15–45 分钟常见；勿用 --quiet 以便日志显示各层进度"
              $DOCKER_COMPOSE_PROD pull backend && echo "[info] Backend image pulled successfully"
            fi
            # 先 up 再 init_db：避免 MySQL 正被 force-recreate 时跑 DDL 导致 2013/1317；infra 用 down+up 消除容器名冲突
            if [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] infra 变更：compose down（--remove-orphans）后整栈 up"
              $DOCKER_COMPOSE_PROD down --remove-orphans
              $DOCKER_COMPOSE_PROD up -d
            else
              RECREATE_SERVICES=""
              if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
                RECREATE_SERVICES="$RECREATE_SERVICES frontend"
              fi
              if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
                RECREATE_SERVICES="$RECREATE_SERVICES backend download-server"
              fi
              echo "[info] Code changed, recreating: $RECREATE_SERVICES"
              $DOCKER_COMPOSE_PROD up -d --force-recreate $RECREATE_SERVICES
            fi
            echo "[info] 等待 MySQL healthy（最多约 3min）..."
            for i in $(seq 1 90); do
              if $DOCKER_COMPOSE_PROD ps mysql 2>/dev/null | grep -q healthy; then
                echo "[info] MySQL 已 healthy，再等 10s 后执行 init_db"
                sleep 10
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "[warn] 仍未检测到 MySQL healthy，仍尝试 init_db"
              fi
              sleep 2
            done
            if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] 初始化/校验数据库表结构（python init_db.py）..."
              $DOCKER_COMPOSE_PROD run --rm --no-deps -e PYTHONUNBUFFERED=1 backend python -u init_db.py || echo "[warn] db init failed, continue"
            fi
            curl -fsS "http://127.0.0.1:8080/" >/dev/null || echo "[warn] frontend health failed"
            curl -fsS "http://127.0.0.1:18005/health" >/dev/null || echo "[warn] backend health failed"
            curl -fsS "http://127.0.0.1:18001/health" >/dev/null || echo "[warn] download health failed"
            docker image prune -f

      - name: Deploy via SSH (password)
        if: steps.deploy_auth.outputs.method == 'password'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            # 下载最新的 docker-compose.prod.yml（使用 GitHub API + GHCR_READ_TOKEN）
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/CongWang3/AutoMATA-server/contents/docker-compose.prod.yml?ref=main" | \
              jq -r '.content' | base64 -d > docker-compose.prod.yml
            # 参考注释 SQL：优先 HTTPS（默认阿里云 OSS）；失败则回退 GitHub Release
            export REFERENCE_SQL_ARCHIVE_URL="${{ secrets.REFERENCE_SQL_ARCHIVE_URL }}"
            if [ -z "${REFERENCE_SQL_ARCHIVE_URL}" ]; then
              export REFERENCE_SQL_ARCHIVE_URL="${{ vars.REFERENCE_SQL_ARCHIVE_URL }}"
            fi
            if [ -z "${REFERENCE_SQL_ARCHIVE_URL}" ]; then
              export REFERENCE_SQL_ARCHIVE_URL="https://xxs-img.oss-cn-hangzhou.aliyuncs.com/automata/automata-reference-sql.tar.gz"
            fi
            export REFERENCE_SQL_ARCHIVE_NAME="automata-reference-sql.tar.gz"
            export REFERENCE_SQL_DIR="./data/reference_sql"
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/deploy/fetch-reference-sql-from-url.sh?ref=${{ github.ref_name }}" | \
              jq -r '.content' | base64 -d > /tmp/fetch-reference-sql-from-url.sh
            chmod +x /tmp/fetch-reference-sql-from-url.sh
            curl -fsSL -H "Authorization: token ${{ secrets.GHCR_READ_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/deploy/fetch-reference-from-github-release.sh?ref=${{ github.ref_name }}" | \
              jq -r '.content' | base64 -d > /tmp/fetch-reference-from-github-release.sh
            chmod +x /tmp/fetch-reference-from-github-release.sh
            export REFERENCE_GITHUB_REPO="${{ github.repository }}"
            export REFERENCE_RELEASE_TAG="latest"
            export REFERENCE_ASSET_NAME="automata-reference-sql.tar.gz"
            export REFERENCE_GITHUB_TOKEN="${{ secrets.REFERENCE_GITHUB_TOKEN || secrets.GHCR_READ_TOKEN }}"
            /tmp/fetch-reference-sql-from-url.sh || {
              echo "[warn] OSS/URL 参考 SQL 下载失败，尝试 GitHub Release"
              /tmp/fetch-reference-from-github-release.sh || echo "[warn] reference release fetch failed or skipped"
            }
            # 从 GitHub Secrets 注入 Agent 配置到 .env.prod
            grep -q '^AGENT_ENABLED=' .env.prod && sed -i '/^AGENT_ENABLED=/d' .env.prod
            grep -q '^AGENT_DEFAULT_PROVIDER=' .env.prod && sed -i '/^AGENT_DEFAULT_PROVIDER=/d' .env.prod
            grep -q '^AGENT_DEEPSEEK_API_KEY=' .env.prod && sed -i '/^AGENT_DEEPSEEK_API_KEY=/d' .env.prod
            echo 'AGENT_ENABLED=${{ secrets.AGENT_ENABLED }}' >> .env.prod
            echo 'AGENT_DEFAULT_PROVIDER=${{ secrets.AGENT_DEFAULT_PROVIDER }}' >> .env.prod
            echo 'AGENT_DEEPSEEK_API_KEY=${{ secrets.AGENT_DEEPSEEK_API_KEY }}' >> .env.prod
            # 参考注释 SQL 挂载路径（与 compose 一致）；部署目录不手写，由 CI 每次覆盖写入
            grep -q '^REFERENCE_DATA_SQL_DIR=' .env.prod && sed -i '/^REFERENCE_DATA_SQL_DIR=/d' .env.prod
            echo 'REFERENCE_DATA_SQL_DIR=/app/reference_sql' >> .env.prod
            # 加载环境变量
            set -a && source .env.prod && set +a
            # 使用阿里云 ACR 镜像（国内访问更快）
            export ALIYUN_REGISTRY="crpi-c0pltk6mq32oe9t3.cn-hangzhou.personal.cr.aliyuncs.com"
            export ALIYUN_NAMESPACE="automata-bio"
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
              export FRONTEND_IMAGE_TAG="${{ github.sha }}"
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              export BACKEND_IMAGE_TAG="${{ github.sha }}"
            fi
            # 登录阿里云 ACR
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login --username "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin ${{ env.ALIYUN_REGISTRY }}
            echo "[info] Starting deployment (using Aliyun ACR)..."
            
            # Detect docker compose command
            DOCKER_COMPOSE_CMD="docker compose"
            if ! $DOCKER_COMPOSE_CMD version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker-compose"
            fi
            echo "[info] Using: $DOCKER_COMPOSE_CMD"
            DOCKER_COMPOSE_PROD="$DOCKER_COMPOSE_CMD --env-file .env.prod -f docker-compose.prod.yml"
            
            if [ "${{ needs.changes.outputs.frontend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] Pulling frontend image (layer progress below; large pulls can take many minutes)..."
              $DOCKER_COMPOSE_PROD pull frontend && echo "[info] Frontend image pulled successfully"
            fi
            if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] Pulling backend image — 含 PyTorch 等依赖时镜像可达数 GB，拉取 15–45 分钟常见；勿用 --quiet 以便日志显示各层进度"
              $DOCKER_COMPOSE_PROD pull backend && echo "[info] Backend image pulled successfully"
            fi
            # 先 up 再 init_db：避免 MySQL 正被 force-recreate 时跑 DDL 导致 2013/1317；infra 用 down+up 消除容器名冲突
            if [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] infra 变更：compose down（--remove-orphans）后整栈 up"
              $DOCKER_COMPOSE_PROD down --remove-orphans
              $DOCKER_COMPOSE_PROD up -d
            else
              RECREATE_SERVICES=""
              if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
                RECREATE_SERVICES="$RECREATE_SERVICES frontend"
              fi
              if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
                RECREATE_SERVICES="$RECREATE_SERVICES backend download-server"
              fi
              echo "[info] Code changed, recreating: $RECREATE_SERVICES"
              $DOCKER_COMPOSE_PROD up -d --force-recreate $RECREATE_SERVICES
            fi
            echo "[info] 等待 MySQL healthy（最多约 3min）..."
            for i in $(seq 1 90); do
              if $DOCKER_COMPOSE_PROD ps mysql 2>/dev/null | grep -q healthy; then
                echo "[info] MySQL 已 healthy，再等 10s 后执行 init_db"
                sleep 10
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "[warn] 仍未检测到 MySQL healthy，仍尝试 init_db"
              fi
              sleep 2
            done
            if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ needs.changes.outputs.infra }}" = "true" ]; then
              echo "[info] 初始化/校验数据库表结构（python init_db.py）..."
              $DOCKER_COMPOSE_PROD run --rm --no-deps -e PYTHONUNBUFFERED=1 backend python -u init_db.py || echo "[warn] db init failed, continue"
            fi
            curl -fsS "http://127.0.0.1:8080/" >/dev/null || echo "[warn] frontend health failed"
            curl -fsS "http://127.0.0.1:18005/health" >/dev/null || echo "[warn] backend health failed"
            curl -fsS "http://127.0.0.1:18001/health" >/dev/null || echo "[warn] download health failed"
            docker image prune -f
