server {
    listen 80;
    server_name _;

    # Docker 内置 DNS：在请求时解析 backend，避免 nginx 早于 backend 容器注册 DNS 时启动失败
    # （错误：host not found in upstream "backend"）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 写到标准流，避免非 root worker 对 /var/log/nginx/*.log 执行 reopen 时 Permission denied
    error_log /dev/stderr warn;
    access_log /dev/stdout combined;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 变量 + resolver：强制运行时解析 backend:8005，而非配置加载时解析
    location /api/ {
        set $backend_upstream backend:8005;
        proxy_pass http://$backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        set $backend_upstream backend:8005;
        proxy_pass http://$backend_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
