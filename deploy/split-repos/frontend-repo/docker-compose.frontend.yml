services:
  frontend:
    image: ghcr.io/${GHCR_OWNER}/automata-frontend:latest
    container_name: automata-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "127.0.0.1:8080:80"
