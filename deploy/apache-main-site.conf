# Apache single-domain reverse proxy template for AutoMATA
# Required modules: proxy proxy_http proxy_wstunnel headers rewrite
#
# Replace:
# - your-domain.com
# - port values if you changed FRONTEND_HOST_PORT/BACKEND_HOST_PORT/DOWNLOAD_HOST_PORT

<VirtualHost *:80>
    ServerName AutoMATA.biotools.bio

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# For HTTPS in panel, duplicate VirtualHost :443 and keep the same ProxyPass rules.
