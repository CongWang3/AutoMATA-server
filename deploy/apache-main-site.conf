# Apache 单域名反向代理模板（AutoMATA）
# 启用模块：a2enmod proxy proxy_http proxy_wstunnel headers ssl rewrite
#
# 将 ServerName、SSL 证书路径、以及端口替换为实际值。
# 端口默认值与 docker-compose.prod.yml 一致：
#   FRONTEND_HOST_PORT=8080  BACKEND_HOST_PORT=18005  DOWNLOAD_HOST_PORT=18001
#
# 注意：ProxyPass 顺序 —— 必须先匹配 /api/，再匹配 /，否则 API 会被送到前端。

<VirtualHost *:80>
    ServerName automata.example.com

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName automata.example.com

    # SSLEngine on
    # SSLCertificateFile /path/to/fullchain.pem
    # SSLCertificateKeyFile /path/to/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # 后端 API（须与宿主机映射端口一致，勿写容器内 8005）
    ProxyPass        /api/ http://127.0.0.1:18005/api/ connectiontimeout=5 timeout=300
    ProxyPassReverse /api/ http://127.0.0.1:18005/api/

    # 下载服务
    ProxyPass        /download/ http://127.0.0.1:18001/download/ connectiontimeout=60 timeout=600
    ProxyPassReverse /download/ http://127.0.0.1:18001/download/
    ProxyPass        /job-result/ http://127.0.0.1:18001/job-result/ connectiontimeout=60 timeout=600
    ProxyPassReverse /job-result/ http://127.0.0.1:18001/job-result/
    ProxyPass        /analysis-result/ http://127.0.0.1:18001/analysis-result/ connectiontimeout=60 timeout=600
    ProxyPassReverse /analysis-result/ http://127.0.0.1:18001/analysis-result/

    # WebSocket（仅真实 WS 路径）
    ProxyPass        /api/v1/tasks/ws/status ws://127.0.0.1:18005/api/v1/tasks/ws/status
    ProxyPassReverse /api/v1/tasks/ws/status ws://127.0.0.1:18005/api/v1/tasks/ws/status
    ProxyPass        /api/v1/files/ws/progress ws://127.0.0.1:18005/api/v1/files/ws/progress
    ProxyPassReverse /api/v1/files/ws/progress ws://127.0.0.1:18005/api/v1/files/ws/progress
    ProxyPass        /api/v1/agent/chat ws://127.0.0.1:18005/api/v1/agent/chat
    ProxyPassReverse /api/v1/agent/chat ws://127.0.0.1:18005/api/v1/agent/chat

    # 前端静态站点（放在最后）
    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # 上传体积（按需调整）
    LimitRequestBody 524288000
</VirtualHost>
